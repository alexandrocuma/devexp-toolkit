services:
  openviking:
    image: ghcr.io/volcengine/openviking:main
    ports:
      - "1933:1933"
    volumes:
      - ${HOME}/.openviking/ov.conf:/app/ov.conf:ro
      - openviking_data:/app/data
    depends_on:
      jina-embed:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1933/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  jina-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    volumes:
      - jina_models:/data
    command: --model-id jinaai/jina-embeddings-v2-base-en --port 80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  openviking_data:
  jina_models:
